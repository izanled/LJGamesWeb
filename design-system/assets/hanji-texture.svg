<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 80" shape-rendering="crispEdges" preserveAspectRatio="xMidYMid meet">
  
  <defs>
    <pattern id="grain" width="6" height="6" patternUnits="userSpaceOnUse">
      <rect width="6" height="6" fill="#fdf8ec"></rect>
      <rect x="0" y="0" width="1" height="1" fill="#8a7445" opacity="0.18"></rect>
      <rect x="3" y="2" width="1" height="1" fill="#5c4e30" opacity="0.12"></rect>
      <rect x="1" y="4" width="1" height="1" fill="#b89c5e" opacity="0.20"></rect>
      <rect x="4" y="5" width="1" height="1" fill="#3a3220" opacity="0.08"></rect>
    </pattern>
  </defs>
  <rect width="160" height="80" fill="url(#grain)"></rect>
</svg>